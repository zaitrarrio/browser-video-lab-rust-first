# getrandom 0.4 (pulled in by rand 0.10 via burn-backend) does not enable a
# randomness backend for wasm32-unknown-unknown by default. Selecting the
# `wasm_js` backend lets the Burn student compile for the browser (WebGPU) target.
# Paired with the `getrandom` feature declared in crates/video-web/Cargo.toml.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
