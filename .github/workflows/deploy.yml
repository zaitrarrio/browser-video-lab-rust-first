name: Build & Deploy Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate model manifests
        run: node scripts/check-models.mjs public/models/*/manifest.example.json

      - name: Build demonstration page
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from main; PRs from forks won't have the token.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.RAILWAY_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci --service "${{ vars.RAILWAY_SERVICE || 'browser-video-lab' }}"
