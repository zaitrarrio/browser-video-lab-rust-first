teacher:
  # Replace with an adapter that loads LongLive-1.3B and returns noise_pred + hidden_states.
  factory: longlive_teacher_adapter:build_teacher
  checkpoint: models/LongLive-1.3B/model.pt
  strict: true
  model: {repo: vendor/LongLive, config: configs/inference.yaml}
student:
  factory: builtin:student
  # Approximately 390M parameters; tune after measuring the exact exported graph.
  model: {latent_channels: 4, text_width: 4096, width: 1152, layers: 24, heads: 16, mlp_ratio: 4}
data:
  path: data/longlive-latents
  latent_shape: [1, 4, 4, 32, 48]
  text_shape: [1, 128, 4096]
loss: {output: 1.0, temporal: 0.3, feature: 0.05}
training: {device: cuda, bf16: true, steps: 100000, lr: 0.00002, weight_decay: 0.01, grad_clip: 1.0, log_every: 10, output: artifacts/longlive-browser-384m}
