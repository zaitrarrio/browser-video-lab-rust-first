teacher:
  factory: builtin:toy-teacher
  model: {latent_channels: 4, text_width: 16, width: 32, layers: 2, heads: 4, mlp_ratio: 2}
student:
  factory: builtin:student
  model: {latent_channels: 4, text_width: 16, width: 16, layers: 1, heads: 2, mlp_ratio: 2}
data: {latent_shape: [1, 4, 2, 4, 4], text_shape: [1, 8, 16]}
loss: {output: 1.0, temporal: 0.25, feature: 0.05}
training: {device: cpu, steps: 2, lr: 0.0001, weight_decay: 0.01, grad_clip: 1.0, log_every: 1, output: artifacts/distill-smoke}
